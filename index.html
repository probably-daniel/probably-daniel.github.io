<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="styles.css">
	</head>
	<body>
		<div id="container">
			<div id="backdrop"></div>
			<div id="bg"></div>
			<img id="skry" class="mid"  src="assets/graphics/skry.png">
				<script>
					const audio = new Audio('assets/audio/after_the_storm.mp3');
					audio.load();
					audio.loop = true;
					
					const skry = document.getElementById("skry");
					const bg = document.getElementById("bg");
					const bpm = 79;
					const crochet = (60 / bpm) * 1000;
					var isplaying = false;
					skry.addEventListener("click", function () {
						isplaying = !isplaying;
						if (isplaying) {
							bg.classList.add("abop");
							bg.style.animationDuration = crochet*4 + 'ms';
							bg.style.animationIterationCount = "infinite";
							
							skry.classList.add("dbop");
							skry.style.animationDuration = crochet + 'ms';
							skry.style.animationIterationCount = "infinite";
							bg.style.animationPlayState = "running"; 
							skry.style.animationPlayState = "running";
							
							audio.play();
						} else {
							bg.style.animationPlayState = "paused"; 
							skry.style.animationPlayState = "paused"; 
							audio.pause();
						}

						// print out it work
						console.log("skry.mp3");
					});
				</script>
			</img>
		</div>
	</body>
</html>
